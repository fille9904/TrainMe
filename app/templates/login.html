{% extends "base.html" %}

{% block title %}Log in | TrainMe{% endblock %}

{% block content %}
<section class="form-shell narrow">
    <div>
        <p class="eyebrow">Welcome back</p>
        <h1>Log in</h1>
        <p class="lead">Continue with AI coaching and Strava data.</p>
    </div>

    <form class="form-card" method="post" action="/logga-in">
        {% if error %}
            <p class="form-error">Wrong email or password.</p>
        {% endif %}

        <label>Email
            <input name="email" type="email" autocomplete="email" required>
        </label>

        <label>Password
            <input name="password" type="password" autocomplete="current-password" required>
        </label>

        <button class="primary-button" type="submit">Log in</button>
        <a class="text-link" href="/registrera">Create account</a>
    </form>
</section>
{% endblock %}
