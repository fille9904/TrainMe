<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}TrainMe{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <header class="site-header">
        <a class="brand" href="/">
            <span class="brand-mark">T</span>
            <span>TrainMe</span>
        </a>

        <nav class="nav-links" aria-label="Main menu">
            <a href="/spar/komma-igang">Getting started</a>
            <a href="/spar/aktiv">Active</a>
            <a href="/spar/atlet">Athlete</a>
        </nav>

        <div class="account-actions">
            {% if user %}
                <a class="ghost-button" href="/ai-coach">AI coach</a>
                <form method="post" action="/logga-ut">
                    <button class="icon-button" type="submit" aria-label="Log out" title="Log out">Exit</button>
                </form>
            {% else %}
                <a class="ghost-button" href="/logga-in">Log in</a>
                <a class="primary-button compact" href="/registrera">Create account</a>
            {% endif %}
        </div>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
