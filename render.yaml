services:
  - type: web
    name: trainme
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python app/main.py
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: TRAINME_DB_PATH
        value: /var/data/trainme.db
      - key: STRAVA_CLIENT_ID
        sync: false
      - key: STRAVA_CLIENT_SECRET
        sync: false
      - key: STRAVA_REDIRECT_URI
        sync: false
    disk:
      name: trainme-data
      mountPath: /var/data
      sizeGB: 1
