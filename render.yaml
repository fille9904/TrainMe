services:
  - type: web
    name: trainme
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python app/main.py
    healthCheckPath: /
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: TRAINME_DB_PATH
        value: /tmp/trainme.db
      - key: DATABASE_URL
        sync: false
      - key: STRAVA_CLIENT_ID
        sync: false
      - key: STRAVA_CLIENT_SECRET
        sync: false
      - key: STRAVA_REDIRECT_URI
        sync: false
      - key: OPENAI_API_KEY
        sync: false
